<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSes.online - Android 13 Simulator</title>
    <style>
        :root {
            --surface-color: #FFFFFF;
            --primary-color: #6750A4; /* Android 13 Material You Purple */
            --on-primary: #FFFFFF;
            --text-main: #1C1B1F;
            --text-secondary: #49454F;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Roboto', 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111;
        }

        /* Phone Frame with your Wallpaper */
        .phone-frame {
            width: 380px;
            height: 800px;
            /* Your custom wallpaper */
            background-image: url('https://file.garden/ZgfK0UDRARPwyXVE/OSes.online/Wallpaper/Android13/Android13.png');
            background-size: cover;
            background-position: center;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 8px solid #000;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        /* Status Bar */
        .status-bar {
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
            z-index: 100;
        }

        /* --- Lock Screen (Blurred Background) --- */
        #lockScreen {
            background: rgba(0, 0, 0, 0.3); /* Dark overlay */
            backdrop-filter: blur(15px); /* Blur effect */
            -webkit-backdrop-filter: blur(15px);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px;
        }
        .lock-clock {
            text-align: center;
            margin-top: 80px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .lock-clock .time { font-size: 64px; font-weight: 300; }
        .lock-clock .date { font-size: 16px; margin-top: 5px; opacity: 0.9; }
        .lock-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lock-icon-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .swipe-up-hint {
            text-align: center;
            font-size: 12px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        /* --- PIN Screen (Frosted Glass) --- */
        #pinScreen {
            background: rgba(20, 20, 20, 0.4); /* Semi-transparent dark */
            backdrop-filter: blur(30px); /* Heavy blur for PIN screen */
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            color: white;
        }
        .pin-dots {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }
        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
        }
        .pin-dot.filled {
            background-color: white;
            border-color: white;
        }
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            gap: 15px;
            margin-top: 20px;
        }
        .key {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, background-color 0.2s;
        }
        .key:active { transform: scale(0.95); background-color: rgba(255,255,255,0.3); }
        .key.delete { background: none; font-size: 18px; color: rgba(255,255,255,0.7); }

        /* --- Home Screen (Transparent to show wallpaper) --- */
        #homeScreen {
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
            background: transparent; 
        }
        .search-bar {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: grab;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .app-icon:active {
            cursor: grabbing;
        }
        .app-icon .icon-img {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            pointer-events: none; /* Allows drag events to target the parent cleanly */
        }
        .app-icon .icon-label { 
            font-size: 12px; 
            color: white; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            pointer-events: none;
        }
        
        /* Drag and Drop States */
        .app-icon.dragging {
            opacity: 0.3;
        }
        .app-icon.drag-over {
            transform: scale(1.15); /* Pop out effect when hovering */
        }

        .dock {
            margin-top: auto;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dock .app-icon { cursor: default; } /* Dock icons are not draggable */
        .dock .app-icon .icon-label { display: none; }
        .dock .app-icon .icon-img { width: 50px; height: 50px; }

        /* --- Quick Settings Panel --- */
        #quickSettings {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            top: -100%;
            transition: top 0.3s ease;
            padding: 30px 20px;
            z-index: 50;
            color: white;
        }
        #quickSettings.active { top: 0; }
        .qs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 40px;
        }
        .qs-tile {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .qs-tile.active { background: var(--primary-color); color: var(--on-primary); }
        .qs-tile .qs-icon { font-size: 24px; }
        .qs-tile .qs-label { font-size: 14px; font-weight: 500; }
        .qs-close {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        /* Shake animation for wrong PIN */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        
        <!-- Status Bar (Shared) -->
        <div class="status-bar" style="position: absolute; width: 100%; pointer-events: none;">
            <span>12:34</span>
            <span>📶 🔋 85%</span>
        </div>

        <!-- 1. Lock Screen -->
        <div id="lockScreen" class="screen">
            <div class="lock-clock">
                <div class="time">12:34</div>
                <div class="date">Thu, Oct 12</div>
            </div>
            <div>
                <div class="lock-bottom">
                    <div class="lock-icon-btn">📞</div>
                    <div class="lock-icon-btn">📷</div>
                </div>
                <div class="swipe-up-hint">Swipe up to unlock</div>
            </div>
        </div>

        <!-- 2. PIN Screen -->
        <div id="pinScreen" class="screen hidden">
            <h3 style="margin-top: 40px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">Enter your PIN</h3>
            <div class="pin-dots" id="pinDots">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>
            <div class="keypad" id="keypad">
                <!-- Keypad generated by JS -->
            </div>
        </div>

        <!-- 3. Home Screen -->
        <div id="homeScreen" class="screen hidden">
            <div style="height: 30px;"></div> <!-- Spacer for status bar -->
            <div class="search-bar">
                <span>🔍</span>
                <span>Search Google</span>
            </div>
            
            <div class="app-grid" id="appGrid">
                <div class="app-icon" draggable="true"><div class="icon-img" style="background:#4285F4">💬</div><div class="icon-label">Messages</div></div>
                <div class="app-icon" draggable="true"><div class="icon-img" style="background:#34A853">📞</div><div class="icon-label">Phone</div></div>
                <div class="app-icon" draggable="true"><div class="icon-img" style="background:#EA4335">📷</div><div class="icon-label">Camera</div></div>
                <div class="app-icon" draggable="true"><div class="icon-img" style="background:#FFB300">⚙️</div><div class="icon-label">Settings</div></div>
                <div class="app-icon" draggable="true"><div class="icon-img" style="background:#673AB7">📅</div><div class="icon-label">Calendar</div></div>
                <div class="app-icon" draggable="true"><div class="icon-img" style="background:#009688">🕐</div><div class="icon-label">Clock</div></div>
                <div class="app-icon" draggable="true"><div class="icon-img" style="background:#FF5722">🔥</div><div class="icon-label">Chrome</div></div>
                <div class="app-icon" draggable="true"><div class="icon-img" style="background:#795548">📁</div><div class="icon-label">Files</div></div>
            </div>

            <div class="dock" id="dock">
                <!-- Dock icons explicitly do NOT have draggable="true" -->
                <div class="app-icon"><div class="icon-img" style="background:#4285F4">✉️</div></div>
                <div class="app-icon"><div class="icon-img" style="background:#34A853">🧭</div></div>
                <div class="app-icon"><div class="icon-img" style="background:#EA4335">🎵</div></div>
                <div class="app-icon"><div class="icon-img" style="background:#FFB300">⚙️</div></div>
            </div>
        </div>

        <!-- 4. Quick Settings Panel -->
        <div id="quickSettings" class="screen">
            <div style="display:flex; justify-content:space-between; padding: 0 10px;">
                <span style="font-weight:600;">12:34</span>
                <span>📶 🔋 85%</span>
            </div>
            <div class="qs-grid">
                <div class="qs-tile active" onclick="toggleTile(this)">
                    <div class="qs-icon">📶</div>
                    <div class="qs-label">Wi-Fi</div>
                </div>
                <div class="qs-tile" onclick="toggleTile(this)">
                    <div class="qs-icon">🔵</div>
                    <div class="qs-label">Bluetooth</div>
                </div>
                <div class="qs-tile" onclick="toggleTile(this)">
                    <div class="qs-icon">✈️</div>
                    <div class="qs-label">Airplane</div>
                </div>
                <div class="qs-tile" onclick="toggleTile(this)">
                    <div class="qs-icon">🔦</div>
                    <div class="qs-label">Flashlight</div>
                </div>
            </div>
            <div class="qs-close" onclick="closeQuickSettings()">Swipe down to close</div>
        </div>

    </div>

    <script>
        // --- Screen Elements ---
        const lockScreen = document.getElementById('lockScreen');
        const pinScreen = document.getElementById('pinScreen');
        const homeScreen = document.getElementById('homeScreen');
        const quickSettings = document.getElementById('quickSettings');
        const appGrid = document.getElementById('appGrid');

        // --- State ---
        let currentPin = "";
        const correctPin = "1234"; // Set your PIN here

        // --- Navigation Logic ---
        function showScreen(screenToShow) {
            [lockScreen, pinScreen, homeScreen].forEach(s => s.classList.add('hidden'));
            screenToShow.classList.remove('hidden');
        }

        // 1. Lock Screen -> PIN Screen
        lockScreen.addEventListener('click', () => {
            showScreen(pinScreen);
        });

        // 2. PIN Screen Logic
        const keypad = document.getElementById('keypad');
        const pinDots = document.querySelectorAll('.pin-dot');

        // Generate Keypad
        const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '', '0', '⌫'];
        keys.forEach(k => {
            let btn = document.createElement('div');
            btn.className = 'key';
            if (k === '⌫') btn.classList.add('delete');
            btn.innerText = k;
            if (k !== '') {
                btn.addEventListener('click', () => handleKeyPress(k));
            }
            keypad.appendChild(btn);
        });

        function handleKeyPress(key) {
            if (key === '⌫') {
                currentPin = currentPin.slice(0, -1);
            } else if (currentPin.length < 4) {
                currentPin += key;
            }

            updatePinDots();

            if (currentPin.length === 4) {
                setTimeout(() => {
                    if (currentPin === correctPin) {
                        showScreen(homeScreen);
                        currentPin = "";
                        updatePinDots();
                    } else {
                        pinScreen.style.animation = "shake 0.3s";
                        setTimeout(() => {
                            pinScreen.style.animation = "";
                            currentPin = "";
                            updatePinDots();
                        }, 300);
                    }
                }, 100);
            }
        }

        function updatePinDots() {
            pinDots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        // 3. Home Screen -> Quick Settings
        let touchStartY = 0;

        homeScreen.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        homeScreen.addEventListener('touchmove', (e) => {
            let touchY = e.touches[0].clientY;
            // Swipe down from top
            if (touchStartY < 50 && touchY > touchStartY) {
                openQuickSettings();
            }
        });

        // Mouse fallback for desktop testing
        homeScreen.addEventListener('mousedown', (e) => {
            // Prevent Quick Settings opening if we are dragging an app
            if (e.target.closest('.app-icon') && e.target.closest('#appGrid')) return;
            if (e.clientY < 50) {
                openQuickSettings();
            }
        });

        function openQuickSettings() {
            quickSettings.classList.add('active');
        }

        function closeQuickSettings() {
            quickSettings.classList.remove('active');
        }

        quickSettings.addEventListener('click', (e) => {
            if (e.target === quickSettings) {
                closeQuickSettings();
            }
        });

        // 4. Quick Settings Toggles
        function toggleTile(element) {
            element.classList.toggle('active');
        }

        // 5. App Icon Drag and Drop Logic
        let draggedItem = null;

        // Attach listeners to all draggable app icons
        appGrid.querySelectorAll('.app-icon').forEach(item => {
            item.addEventListener('dragstart', handleDragStart);
            item.addEventListener('dragover', handleDragOver);
            item.addEventListener('dragleave', handleDragLeave);
            item.addEventListener('drop', handleDrop);
            item.addEventListener('dragend', handleDragEnd);
        });

        function handleDragStart(e) {
            draggedItem = this;
            setTimeout(() => this.classList.add('dragging'), 0); // Hides original item slightly
        }

        function handleDragOver(e) {
            e.preventDefault(); // Necessary to allow dropping
            if (this !== draggedItem) {
                this.classList.add('drag-over');
            }
        }

        function handleDragLeave() {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            if (draggedItem !== this) {
                // Swap the nodes in the grid
                const allItems = Array.from(appGrid.children);
                const draggedIndex = allItems.indexOf(draggedItem);
                const targetIndex = allItems.indexOf(this);

                if (draggedIndex < targetIndex) {
                    // Insert dragged item before the target
                    appGrid.insertBefore(draggedItem, this.nextSibling);
                } else {
                    // Insert dragged item before the target
                    appGrid.insertBefore(draggedItem, this);
                }
            }
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            // Clean up any leftover hover states
            appGrid.querySelectorAll('.app-icon').forEach(i => i.classList.remove('drag-over'));
            draggedItem = null;
        }

    </script>
</body>
</html>
